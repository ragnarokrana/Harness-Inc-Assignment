pipeline:
  name: ci-pipeline-build
  identifier: cipipelinebuild
  projectIdentifier: Harness_Inc_Assignment
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: Assignment_Connector
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
            override: true
            paths: []
          buildIntelligence:
            enabled: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Build
                  identifier: Build
                  spec:
                    shell: Sh
                    image: docker:28
                    command: docker build -t harness-demo-app .
              - step:
                  type: Run
                  name: Push Image
                  identifier: Push_Image
                  spec:
                    shell: Sh
                    image: docker:28
                    command: |
                      docker login trialtfe0xb.jfrog.io \
                        -u "ssharma3105@rediffmail.com" \
                        -p "<+secrets.getValue('password')>"

                      docker tag harness-demo-app \
                        trialtfe0xb.jfrog.io/docker-local-docker/harness-demo-app:<+pipeline.sequenceId>

                      docker push \
                        trialtfe0xb.jfrog.io/docker-local-docker/harness-demo-app:<+pipeline.sequenceId>

                      docker tag harness-demo-app \
                        trialtfe0xb.jfrog.io/docker-local-docker/harness-demo-app:latest

                      docker push \
                        trialtfe0xb.jfrog.io/docker-local-docker/harness-demo-app:latest
